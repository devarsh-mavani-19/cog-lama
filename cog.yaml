build:
  gpu: true
  cuda: "11.8"
  python_version: "3.10"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "libsm6"
    - "libxext6"
    - "libxrender-dev"
  python_packages:
    - "torch==2.0.1"
    - "torchvision==0.15.2"
    - "numpy==1.24.4"
    - "opencv-python==4.8.0.76"
    - "Pillow>=9.0"
  run:
    - "mkdir -p /lama"
    - "curl -L -o /lama/big-lama.pt https://github.com/Sanster/models/releases/download/add_big_lama/big-lama.pt"

predict: "predict.py:Predictor"

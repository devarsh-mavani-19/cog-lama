build:
  gpu: true
  cuda: "11.8"
  python_version: "3.10"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "libsm6"
    - "libxext6"
    - "libxrender-dev"
  python_packages:
    - "torch==2.0.1"
    - "torchvision==0.15.2"
    - "pytorch-lightning==1.9.5"
    - "numpy==1.24.4"
    - "opencv-python==4.8.0.76"
    - "scikit-image==0.21.0"
    - "scikit-learn==1.3.0"
    - "pyyaml>=5.4"
    - "easydict==1.10"
    - "albumentations==1.3.1"
    - "hydra-core==1.1.0"
    - "kornia==0.7.0"
    - "tabulate"
    - "omegaconf==2.1.2"
    - "Pillow>=9.0"
    - "webdataset"
    - "packaging"
    - "pandas"
  run:
    - "pip install wldhx.yadisk-direct"
    - "git clone https://github.com/advimman/lama.git /lama"
    - "curl -L -o /lama/big-lama.zip https://huggingface.co/smartywu/big-lama/resolve/main/big-lama.zip"
    - "cd /lama && unzip big-lama.zip && rm big-lama.zip"

predict: "predict.py:Predictor"

build:
  gpu: true
  cuda: "11.1"
  python_version: "3.8"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "libsm6"
    - "libxext6"
    - "libxrender-dev"
  python_packages:
    - "torch==1.8.0"
    - "torchvision==0.9.0"
    - "pytorch-lightning==1.2.9"
    - "numpy==1.23.5"
    - "opencv-python==4.5.5.64"
    - "scikit-image==0.17.2"
    - "scikit-learn==0.24.2"
    - "pyyaml>=5.4"
    - "easydict==1.9"
    - "albumentations==0.5.2"
    - "hydra-core==1.1.0"
    - "kornia==0.5.0"
    - "tabulate"
    - "omegaconf==2.1.2"
    - "Pillow>=8.0"
    - "webdataset"
    - "packaging"
  run:
    - "pip install wldhx.yadisk-direct"
    - "git clone https://github.com/advimman/lama.git /lama"
    - "curl -L -o /lama/big-lama.zip https://huggingface.co/smartywu/big-lama/resolve/main/big-lama.zip"
    - "cd /lama && unzip big-lama.zip && rm big-lama.zip"

predict: "predict.py:Predictor"
